name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          URLS=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/BLACK_VLESS_RUS.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyakbeta7.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyaktestru.txt"
          )
          
          > raw.txt
          for url in "${URLS[@]}"; do
            curl -s "$url" >> raw.txt
          done
          
          grep -E 'vless://|trojan://' raw.txt | sort -u | head -n 120 > filtered.txt
          sed -E '/(🚀|🔥|🥭)/!s/$/ 🚀 🥭 🔥/' filtered.txt > final_list.txt
          
          {
            echo "# profile-title: XpaVPN | ELITE"
            echo "# announce: Поддержка: @XpaneR | Проект закрытого типа."
            echo "# profile-update-interval: 1"
            echo "# profile-web-page-url: https://t.me/XpaVPN"
            echo "# support-url: https://t.me/XpaneR"
            echo "# subscription-userinfo: upload=0;download=51539607552;total=0;expire=252460800000"
            
            # Добавление 4 инфо-серверов в самое начало списка
            echo "vless://00000000-0000-0000-0000-000000000000@127.0.0.1:443?encryption=none&security=reality&type=tcp#Наш ТГК @XpaVPN"
            echo "vless://00000000-0000-0000-0000-000000000000@127.0.0.1:443?encryption=none&security=reality&type=tcp#Подписка навсегда"
            echo "vless://00000000-0000-0000-0000-000000000000@127.0.0.1:443?encryption=none&security=reality&type=tcp#Окончание 01.01.9999 в 00:00"
            echo "vless://00000000-0000-0000-0000-000000000000@127.0.0.1:443?encryption=none&security=reality&type=tcp#----------------"
            
            cat final_list.txt
          } > index.html
          
          # Автоматическое создание файла CNAME с новым свободным поддоменом
          echo "vpn.xpavpns.indevs.in" > CNAME
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add index.html CNAME
          git commit -m "Update subscription and CNAME $(date +'%Y-%m-%d %H:%M')" || true
          git push origin main
          
          rm raw.txt filtered.txt final_list.txt
