name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          URLS=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-all.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyakbeta7.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyaktestru.txt"
          )
          
          > raw.txt
          for url in "${URLS[@]}"; do
            curl -s --fail "$url" >> raw.txt || echo "# Failed: $url" >> raw.txt
            echo "" >> raw.txt
          done
          
          get_country() {
            local host="$1"
            host=$(echo "$host" | cut -d':' -f1)
            case "$host" in
              *".ru"*|*"ru-"*|*-ru*|*"moscow"*|*"russia"*) echo "🇷🇺 Russia" ;;
              *".de"*|*"-de"*|*"frankfurt"*|*"germany"*) echo "🇩🇪 Germany" ;;
              *".fr"*|*"-fr"*|*"paris"*|*"france"*) echo "🇫🇷 France" ;;
              *".nl"*|*"-nl"*|*"amsterdam"*|*"netherlands"*) echo "🇳🇱 Netherlands" ;;
              *".uk"*|*".gb"*|*"-uk"*|*"london"*|*"united kingdom"*) echo "🇬🇧 UK" ;;
              *".us"*|*"-us"*|*"newyork"*|*"unitedstates"*) echo "🇺🇸 USA" ;;
              *".jp"*|*"-jp"*|*"tokyo"*|*"japan"*) echo "🇯🇵 Japan" ;;
              *".sg"*|*"-sg"*|*"singapore"*) echo "🇸🇬 Singapore" ;;
              *".ca"*|*"-ca"*|*"canada"*) echo "🇨🇦 Canada" ;;
              *".au"*|*"-au"*|*"australia"*) echo "🇦🇺 Australia" ;;
              *"iran"*|*"tehran"*|*".ir"*) echo "🇮🇷 Iran" ;;
              *"turkey"*|*"istanbul"*|*".tr"*) echo "🇹🇷 Turkey" ;;
              *) echo "🌐 Unknown" ;;
            esac
          }
          
          get_keywords() {
            local config="$1"
            local keywords=""
            if echo "$config" | grep -qi "youtube\|yt\|video"; then
              keywords="${keywords}YT "
            fi
            if echo "$config" | grep -qi "ai\|chatgpt\|gpt\|openai"; then
              keywords="${keywords}AI "
            fi
            if echo "$config" | grep -qi "game\|gaming\|steam\|pubg\|roblox"; then
              keywords="${keywords}GAME "
            fi
            if echo "$config" | grep -qi "stream\|netflix\|disney\|hbo"; then
              keywords="${keywords}STREAM "
            fi
            echo "$keywords" | xargs
          }
          
          grep -E 'vless://|trojan://' raw.txt | sort -u > temp_unique.txt
          
          awk -F'[@:]' '
            {
              split($0, a, "@")
              split(a[2], b, ":")
              host = b[1]
              split(b[2], c, "?")
              port = c[1]
              key = host ":" port
              if (!seen[key]++) print
            }' temp_unique.txt > unique.txt
          
          > final_list.txt
          COUNTER=1
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            
            NUM=$(printf "%04d" $COUNTER)
            HOST=$(echo "$line" | sed -E 's/.*@([^:?]+).*/\1/')
            COUNTRY_FLAG=$(get_country "$HOST")
            KEYWORDS=$(get_keywords "$line")
            
            if [[ "$line" == *"#"* ]]; then
              BASE_LINE=$(echo "$line" | sed -E 's/#.*$//')
              NEW_NAME="$NUM | $COUNTRY_FLAG | XpaVPN"
              [ -n "$KEYWORDS" ] && NEW_NAME="$NUM | $KEYWORDS | $COUNTRY_FLAG | XpaVPN"
              echo "${BASE_LINE}#${NEW_NAME}" >> final_list.txt
            else
              NEW_NAME="$NUM | $COUNTRY_FLAG | XpaVPN"
              [ -n "$KEYWORDS" ] && NEW_NAME="$NUM | $KEYWORDS | $COUNTRY_FLAG | XpaVPN"
              echo "${line}#${NEW_NAME}" >> final_list.txt
            fi
            
            COUNTER=$((COUNTER + 1))
          done < unique.txt
          
          CONFIGS_COUNT=$((COUNTER - 1))
          
          CURRENT_DATETIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          CURRENT_FULL=$(date -u '+%d.%m.%Y %H:%M:%S')
          NEXT_HOUR=$(date -u -d '+1 hour' '+%d.%m.%Y %H:00:00')
          
          cat > index.html << EOF
# profile-title: XpaVPN | ELITE
# announce: Поддержка: @XpaneR | Проект закрытого типа.
# profile-update-interval: 1
# profile-web-page-url: https://t.me/XpaVPN
# support-url: https://t.me/XpaneR
# subscription-userinfo: upload=0;download=51539607552;total=0;expire=252460800000
# last-update: $CURRENT_FULL
# next-update: $NEXT_HOUR
# servers-count: $CONFIGS_COUNT

vless://00000000-0000-0000-0000-000000000000@127.0.0.1:443?encryption=none&security=reality&type=tcp#Наш ТГК @XpaVPN
vless://00000000-0000-0000-0000-000000000000@127.0.0.1:443?encryption=none&security=reality&type=tcp#Подписка навсегда
vless://00000000-0000-0000-0000-000000000000@127.0.0.1:443?encryption=none&security=reality&type=tcp#Окончание 01.01.9999
vless://00000000-0000-0000-0000-000000000000@127.0.0.1:443?encryption=none&security=reality&type=tcp#----------------
EOF
          
          cat final_list.txt >> index.html
          
          echo "vpn.xpavpns.indevs.in" > CNAME
          base64 -w 0 index.html > subscription_b64.txt
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add index.html CNAME subscription_b64.txt
          git commit -m "🔄 XpaVPN обновление $CURRENT_DATETIME | Конфигов: $CONFIGS_COUNT" || true
          
          git push origin main
          
          rm -f raw.txt temp_unique.txt unique.txt final_list.txt
