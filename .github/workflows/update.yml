name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Index
        run: |
          # Собираем данные
          echo "# profile-title: XpaVPN | ELITE" > temp.txt
          echo "# announce: Поддержка: @XpaneR | Проект закрытого типа." >> temp.txt
          echo "# profile-update-interval: 1" >> temp.txt
          echo "# profile-web-page-url: https://t.me/XpaVPN" >> temp.txt
          echo "# support-url: https://t.me/XpaneR" >> temp.txt
          echo "# subscription-userinfo: upload=0;download=275049845719040;total=0;expire=2524608000" >> temp.txt
          
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" | grep -v '^#' | grep -v '^$' >> all.txt || true
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" | grep -v '^#' | grep -v '^$' >> all.txt || true
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt" | grep -v '^#' | grep -v '^$' >> all.txt || true
          
          sort -u all.txt | shuf | head -n 100 >> temp.txt
          
          # Кодируем в Base64 и пишем в файл
          base64 -w 0 temp.txt > index.html
          rm temp.txt all.txt

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Update" || exit 0
          git push
