name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4
      with:
        token: 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

    - name: Сборка конфигураций VPN
      run: |
        # 1. Создаем правильный заголовок подписки
        echo "# profile-title: XpaVPN | PREMIUM" > index.html
        echo "# profile-update-interval: 1" >> index.html
        echo "# profile-web-page-url: https://t.me/XpaVPN" >> index.html
        echo "# support-url: https://t.me/XpaneR" >> index.html
        echo "# announce: Поддержка: @XpaneR | 🔄 Обновление каждый час" >> index.html
        echo "# subscription-userinfo: upload=0;download=291372332154880;total=0;expire=2524608000" >> index.html

        # 2. Скачиваем базы, убираем комментарии/пустые строки и склеиваем в один файл
        curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" | grep -v '^#' | grep -v '^$' >> temp_configs.txt || true
        curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" | grep -v '^#' | grep -v '^$' >> temp_configs.txt || true
        curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt" | grep -v '^#' | grep -v '^$' >> temp_configs.txt || true

        # 3. Сортируем и убираем дубликаты серверов, затем закидываем в финальный файл
        sort -u temp_configs.txt >> index.html

    - name: Сохранение изменений в GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Автообновление конфигураций VPN" || exit 0
        git push
