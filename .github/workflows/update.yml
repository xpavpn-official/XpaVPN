name: Update VPN Configs
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Index
        run: |
          # 1. Скачиваем конфиги
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" > raw.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt" >> raw.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt" >> raw.txt
          
          # 2. Фильтруем (оставляем только vless/trojan)
          grep -E 'vless://|trojan://' raw.txt | sort -u > filtered.txt
          
          # 3. Собираем файл с правильной шапкой
          {
            echo "# profile-title: XpaVPN | ELITE"
            echo "# profile-update-interval: 1"
            echo "# profile-web-page-url: https://t.me/XpaVPN"
            echo "# support-url: https://t.me/XpaneR"
            echo "# announce: ✈️ XpaVPN | ELITE | Работает стабильно"
            echo "# subscription-userinfo: upload=0;download=0;total=0;expire=253370764800"
            cat filtered.txt
          } > index.html
          
          # 4. Сохраняем изменения
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update subscription" || true
          git push
