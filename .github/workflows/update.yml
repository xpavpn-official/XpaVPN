name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Index
        run: |
          FILENAME="vless-a9f8b2c4e1d0.txt"
          
          echo "# profile-title: XpaVPN | ELITE" > $FILENAME
          echo "# announce: Поддержка: @XpaneR | Проект закрытого типа." >> $FILENAME
          echo "# profile-update-interval: 1" >> $FILENAME
          echo "# profile-web-page-url: https://t.me/XpaVPN" >> $FILENAME
          echo "# support-url: https://t.me/XpaneR" >> $FILENAME
          echo "# subscription-userinfo: upload=0;download=275049845719040;total=0;expire=2524608000" >> $FILENAME
          
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" | grep -v '^#' | grep -v '^$' >> all.txt || true
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" | grep -v '^#' | grep -v '^$' >> all.txt || true
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt" | grep -v '^#' | grep -v '^$' >> all.txt || true
          
          sort -u all.txt | shuf | head -n 100 >> $FILENAME
          rm all.txt

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update" || exit 0
          git push
