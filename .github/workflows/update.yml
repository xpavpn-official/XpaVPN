name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          URLS=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          )
          
          > raw.txt
          for url in "${URLS[@]}"; do
            echo "Fetching $url..."
            curl -sSf "$url" >> raw.txt || echo "Failed to fetch $url"
          done
          
          # Фильтрация и создание списка
          grep -E 'vless://|trojan://' raw.txt | sort -u | head -n 120 > filtered.txt
          sed -E '/(🚀|🔥|🥭)/!s/$/ 🚀 🥭 🔥/' filtered.txt > final_list.txt
          
          # Формирование index.html
          {
            echo "# profile-title: XpaVPN | ELITE"
            echo "# announce: Поддержка: @XpaneR | Проект закрытого типа."
            echo "# profile-update-interval: 1"
            echo "# profile-web-page-url: https://t.me/XpaVPN"
            echo "# support-url: https://t.me/XpaneR"
            echo "# subscription-userinfo: upload=0;download=51539607552;total=0;expire=253370764800"
            cat final_list.txt
          } > index.html
          
          # Настройка и отправка изменений
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Проверка на изменения перед коммитом
          if [[ -n $(git status -s) ]]; then
            git add index.html
            git commit -m "Update subscription $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes detected, skipping commit."
          fi
          
          rm raw.txt filtered.txt final_list.txt
