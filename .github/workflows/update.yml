name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Index
        run: |
          # 1. Записываем заголовки в чистом виде
          echo "# profile-title: XpaVPN | ELITE" > index.html
          echo "# announce: Поддержка: @XpaneR | Проект закрытого типа." >> index.html
          echo "# profile-update-interval: 1" >> index.html
          echo "# profile-web-page-url: https://t.me/XpaVPN" >> index.html
          echo "# support-url: https://t.me/XpaneR" >> index.html
          echo "# subscription-userinfo: upload=0;download=275049845719040;total=0;expire=2524608000" >> index.html
          
          # 2. Скачиваем конфиги
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" | grep -v '^#' | grep -v '^$' >> temp.txt || true
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" | grep -v '^#' | grep -v '^$' >> temp.txt || true
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt" | grep -v '^#' | grep -v '^$' >> temp.txt || true

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Update" || exit 0
          git push
