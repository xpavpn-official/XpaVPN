name: Update VPN Configs

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: # 

permissions:
  contents: write # Разрешение роботу обновлять файлы в репозитории

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Настройка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Запуск парсера конфигов
      run: |
        python -c '
        import urllib.request
        
        urls = [
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt",
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt",
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt"
        ]
        
        headers = """# profile-title: XpaVPN | PREMIUM
        # profile-update-interval: 2
        # profile-web-page-url: https://t.me/XpaVPN
        # support-url: https://t.me/XpaneR
        # announce: Конфиги обновляются автоматически Поддержка - @XpaneR
        # subscription-userinfo: upload=0;download=133772337258856448;total=0;expire=2524608000"""
        
        unique_configs = set()
        for url in urls:
            try:
                req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                with urllib.request.urlopen(req) as response:
                    content = response.read().decode("utf-8")
                    for line in content.splitlines():
                        cleaned = line.strip()
                        # Проверяем, что строка не пустая и не является старым комментарием
                        if cleaned and not cleaned.startswith("#"):
                            unique_configs.add(cleaned)
            except Exception as e:
                print(f"Ошибка при скачивании {url}: {e}")
                
        # Собираем и убираем лишние отступы у заголовков
        final_content = headers.replace("        ", "") + "\n" + "\n".join(sorted(unique_configs))
        
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(final_content)
        print("Файл index.html успешно сгенерирован!")
        '

    - name: Сохранение изменений в GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Автообновление конфигураций VPN" || exit 0
        git push
