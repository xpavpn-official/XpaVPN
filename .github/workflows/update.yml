name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build VPN Configs
        run: |
          # 1. Создаем правильный заголовок подписки в текстовый файл sub.txt
          echo "# profile-title: XpaVPN | PREMIUM" > sub.txt
          echo "# profile-update-interval: 1" >> sub.txt
          echo "# profile-web-page-url: https://t.me/XpaVPN" >> sub.txt
          echo "# support-url: https://t.me/XpaneR" >> sub.txt
          echo "# announce: Поддержка: @XpaneR | 🔄 Обновление каждый час" >> sub.txt
          echo "# subscription-userinfo: upload=0;download=291372332154880;total=0;expire=2524608000" >> sub.txt

          # 2. Скачиваем базы и склеиваем в один временный файл
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" | grep -v '^#' | grep -v '^$' >> temp.txt || true
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" | grep -v '^#' | grep -v '^$' >> temp.txt || true
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt" | grep -v '^#' | grep -v '^$' >> temp.txt || true

          # 3. Сортируем, убираем дубли и дописываем в sub.txt
          sort -u temp.txt >> sub.txt

      - name: Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          git commit -m "Автообновление конфигураций VPN" || exit 0
          git push
