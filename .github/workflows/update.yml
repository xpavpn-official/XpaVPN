name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Push
        run: |
          URLS=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyakbeta7.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyaktestru.txt"
          )
          
          > raw.txt
          for url in "${URLS[@]}"; do
            curl -s "$url" >> raw.txt
          done
          
          # Берем только vless/trojan, убираем дубликаты, берем первые 120
          grep -E 'vless://|trojan://' raw.txt | sort -u | head -n 120 > filtered.txt
          
          # Добавляем эмодзи тем, у кого их нет
          sed -E '/(🚀|🔥|🥭)/!s/$/ 🚀 🥭 🔥/' filtered.txt > final_list.txt
          
          # Генерируем Base64 из списка
          base64_data=$(base64 -w 0 final_list.txt)
          
          # Собираем файл
          {
            echo "# profile-title: XpaVPN | ELITE"
            echo "# profile-update-interval: 1"
            echo "# subscription-userinfo: upload=0;download=51539607552;total=0;expire=253370764800"
            echo "$base64_data"
          } > index.html
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update subscription $(date +'%Y-%m-%d %H:%M')" || true
          git push
          
          rm raw.txt filtered.txt final_list.txt
