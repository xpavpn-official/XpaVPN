name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Push
        run: |
          # Список источников
          URLS=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyakbeta7.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyaktestru.txt"
          )
          
          # Скачивание и фильтрация
          > raw.txt
          for url in "${URLS[@]}"; do
            curl -s "$url" >> raw.txt
          done
          
          # Очистка имен и удаление дубликатов
          grep -E 'vless://|trojan://' raw.txt | \
          sed -E 's/\[BL\]//g; s/\[CIDR\]//g; s/ +/ /g' | \
          sort -u > filtered.txt
          
          # Сборка Base64 и сохранение в index.html
          {
            echo "# profile-title: XpaVPN | ELITE"
            echo "# profile-update-interval: 1"
            echo "# subscription-userinfo: upload=0;download=51539607552;total=0;expire=253370764800"
            cat filtered.txt | base64 -w 0
          } > index.html
          
          # Пуш изменений
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update subscription to Base64 $(date +'%Y-%m-%d %H:%M')" || true
          git push
          
          # Удаление временных файлов
          rm raw.txt filtered.txt
