<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XpaVPN — Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.15);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .math-quiz {
            background: rgba(124, 58, 237, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid rgba(124, 58, 237, 0.5);
        }

        .math-quiz span {
            font-size: 20px;
            font-weight: 600;
            color: #c4b5fd;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            word-break: break-all;
        }

        .result.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #4ade80;
        }

        .result.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
        }

        .result.info {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #60a5fa;
        }

        .result code {
            display: block;
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
            color: #fff;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 XpaVPN</h1>
            <div class="subtitle">Получите персональную ссылку для подключения</div>

            <div class="input-group">
                <label>📱 Telegram username</label>
                <input type="text" id="username" placeholder="@username" autocomplete="off">
                <small style="color: rgba(255,255,255,0.5); font-size: 12px;">Введите ваш Telegram username (с @)</small>
            </div>

            <div class="math-quiz">
                <span>🧠 Проверка: 12 + 7 = ?</span>
            </div>

            <div class="input-group">
                <label>✏️ Ваш ответ</label>
                <input type="text" id="answer" placeholder="Введите число" autocomplete="off">
            </div>

            <button id="submitBtn" onclick="registerAndGetLink()">✨ Получить ссылку</button>

            <div id="result" class="result"></div>
            <div class="footer">
                Поддержка: <a href="https://t.me/XpaneR">@XpaneR</a>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://vpn.pane1.nx.kg';
        const GITHUB_TOKEN = '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';
        
        async function registerAndGetLink() {
            const username = document.getElementById('username').value.trim();
            const answer = document.getElementById('answer').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('submitBtn');
            
            if (!username || !answer) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Заполните все поля';
                return;
            }
            
            if (!username.startsWith('@')) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Username должен начинаться с @';
                return;
            }
            
            if (answer !== '19') {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Неправильный ответ! Попробуйте ещё раз.';
                return;
            }
            
            btn.innerHTML = '<div class="loading"></div> Регистрация...';
            btn.disabled = true;
            resultDiv.className = 'result info';
            resultDiv.innerHTML = '📝 Проверяем и регистрируем...';
            
            try {
                const checkResponse = await fetch('https://raw.githubusercontent.com/xpavpn-official/XpaVPN/main/users.json');
                let users = {};
                
                if (checkResponse.ok) {
                    users = await checkResponse.json();
                }
                
                if (users[username]) {
                    const token = users[username].token;
                    const url = `${BASE_URL}/users/${token}.html`;
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Вы уже зарегистрированы!<br><br>
                        📋 Ваша персональная ссылка:<br>
                        <code>${url}</code><br><br>
                        Вставьте эту ссылку в ваш VPN-клиент.
                    `;
                    btn.innerHTML = '✨ Получить ссылку';
                    btn.disabled = false;
                    return;
                }
                
                const token = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 8);
                const newUser = {
                    [username]: {
                        token: token,
                        created: new Date().toISOString(),
                        type: "free"
                    }
                };
                
                const mergedUsers = { ...users, ...newUser };
                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(mergedUsers, null, 2))));
                
                const shaResponse = await fetch('https://api.github.com/repos/xpavpn-official/XpaVPN/contents/users.json', {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`
                    }
                });
                
                let sha = null;
                if (shaResponse.ok) {
                    const shaData = await shaResponse.json();
                    sha = shaData.sha;
                }
                
                const updateResponse = await fetch('https://api.github.com/repos/xpavpn-official/XpaVPN/contents/users.json', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Add new user: ${username}`,
                        content: updatedContent,
                        sha: sha
                    })
                });
                
                if (updateResponse.ok) {
                    await fetch('https://api.github.com/repos/xpavpn-official/XpaVPN/dispatches', {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            event_type: 'new-user-registered'
                        })
                    });
                    
                    const url = `${BASE_URL}/users/${token}.html`;
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Регистрация успешна!<br>
                        <strong>🆓 FREE подписка</strong><br><br>
                        📋 Ваша персональная ссылка:<br>
                        <code>${url}</code><br><br>
                        Вставьте эту ссылку в ваш VPN-клиент.<br>
                        Ссылка будет активна через 1-2 минуты.
                    `;
                } else {
                    throw new Error('Failed to save user');
                }
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Ошибка регистрации. Попробуйте позже или напишите @XpaneR';
                console.error(error);
            } finally {
                btn.innerHTML = '✨ Получить ссылку';
                btn.disabled = false;
            }
        }
        
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') registerAndGetLink();
        });
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') registerAndGetLink();
        });
    </script>
</body>
</html>
