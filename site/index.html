<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XpaVPN — Получить ссылку</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.15);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .math-quiz {
            background: rgba(124, 58, 237, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid rgba(124, 58, 237, 0.5);
        }

        .math-quiz span {
            font-size: 20px;
            font-weight: 600;
            color: #c4b5fd;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            word-break: break-all;
        }

        .result.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #4ade80;
        }

        .result.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
        }

        .result code {
            display: block;
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
            color: #fff;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 XpaVPN</h1>
            <div class="subtitle">Получите персональную ссылку для подключения</div>

            <div class="input-group">
                <label>📱 Telegram username</label>
                <input type="text" id="username" placeholder="@username" autocomplete="off">
            </div>

            <div class="math-quiz">
                <span>🧠 Проверка: 12 + 7 = ?</span>
            </div>

            <div class="input-group">
                <label>✏️ Ваш ответ</label>
                <input type="text" id="answer" placeholder="Введите число" autocomplete="off">
            </div>

            <button id="submitBtn" onclick="getLink()">✨ Получить ссылку</button>

            <div id="result" class="result"></div>
            <div class="footer">
                Поддержка: <a href="https://t.me/XpaneR">@XpaneR</a>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://vpn.pane1.nx.kg';
        
        async function getLink() {
            const username = document.getElementById('username').value.trim();
            const answer = document.getElementById('answer').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('submitBtn');
            
            if (!username || !answer) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Заполните все поля';
                return;
            }
            
            if (answer !== '19') {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Неправильный ответ! Попробуйте ещё раз.';
                return;
            }
            
            btn.innerHTML = '<div class="loading"></div> Проверяем...';
            btn.disabled = true;
            
            try {
                const response = await fetch('https://raw.githubusercontent.com/xpavpn-official/XpaVPN/main/users.json');
                if (!response.ok) throw new Error('Network error');
                const users = await response.json();
                
                if (users[username]) {
                    const token = users[username].token;
                    const type = users[username].type === 'premium' ? '💎 PREMIUM' : '🆓 FREE';
                    const url = `${BASE_URL}/users/${token}.html`;
                    
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Доступ предоставлен!<br>
                        <strong>${type}</strong><br><br>
                        📋 Ваша персональная ссылка:<br>
                        <code>${url}</code><br><br>
                        Вставьте эту ссылку в ваш VPN-клиент.
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = '❌ Пользователь не найден. Напишите администратору <a href="https://t.me/XpaneR">@XpaneR</a> для регистрации.';
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Ошибка загрузки базы пользователей. Попробуйте позже.';
            } finally {
                btn.innerHTML = '✨ Получить ссылку';
                btn.disabled = false;
            }
        }
        
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') getLink();
        });
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') getLink();
        });
    </script>
</body>
</html>
